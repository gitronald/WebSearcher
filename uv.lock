[[package]]
name = "websearcher"
version = "0.11.4a0"
source = { editable = "." }
dependencies = [
    { name = "brotli" },
    { name = "orjson" },
    { name = "patchright" },
    { name = "protobuf" },
    { name = "pydantic" },
    { name = "requests" },
