name: Update locations

on:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-locations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - run: uv sync --no-dev
      - name: Update geotargets CSV
        run: uv run --no-dev python -m WebSearcher.locations

      # The upstream filename embeds the real release date; the run date is
      # just when we caught it. Carry the release date in the commit message.
      - name: Read pulled release name
        id: ledger
        run: |
          release=$(uv run --no-dev python -c "import csv; print(list(csv.reader(open('data/locations/ledger.csv', newline='')))[-1][1].removesuffix('.csv'))")
          echo "release=$release" >> "$GITHUB_OUTPUT"

      # No-op when the update was skipped (working tree unchanged).
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          # Branch is cut from the default branch (master), but the PR targets dev so
          # the refresh lands on the active dev line. master stays an ancestor of dev
          # in this repo's flow, so the PR diff is just the CSV change, not the dev delta.
          base: dev
          add-paths: data/locations/*.csv
          branch: bot/locations-update
          delete-branch: true
          commit-message: "update locations: ${{ steps.ledger.outputs.release }}"
          title: "update locations: ${{ steps.ledger.outputs.release }}"
          labels: data
          body: |
            Automated geotargets CSV refresh (weekly cron).

            - `data/locations/geotargets.csv` overwritten with the latest upstream release
            - `data/locations/ledger.csv` logs the collection date and upstream filename

            See `.planners/plans/031-automate-locations-download/plan.md`.
