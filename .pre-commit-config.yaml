repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: pyrefly-check
        name: pyrefly check
        entry: uv run pyrefly check
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
  - repo: local
    hooks:
      - id: planners-validate
        name: validate plan frontmatter
        entry: planners validate
        language: system
        files: ^\.planners/plans/[^/]+/plan\.md$
